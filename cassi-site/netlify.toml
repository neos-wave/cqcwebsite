# Cassi marketing site — static, no build step
[build]
  publish = "."

# Pretty URL for the privacy page (so /privacy works)
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

# Sensible security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
